user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Флаг подозрительных user-agent
    map $http_user_agent $is_bad_ua {
        default 0;
        ~*(sqlmap|nikto|masscan|nmap|zgrab|wpscan|gobuster|dirbuster|acunetix) 1;
    }

    # Логи в формате JSON для удобной обработки fail2ban и аналитики
    log_format edge_json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"host":"$host",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log edge_json;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 15;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 15s;
    reset_timedout_connection on;
    client_max_body_size 2m;
    server_tokens off;

    # Базовые лимиты для защиты edge
    limit_req_zone $binary_remote_addr zone=per_ip_rate:10m rate=20r/s;
    # Усиленный лимит для чувствительных маршрутов
    limit_req_zone $binary_remote_addr zone=per_ip_sensitive:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

    include /etc/nginx/conf.d/*.conf;
}
